# Example config for a generic Laravel project with Docker command execution.
# Copy this into your repo root as `agent-harness.toml` and replace the model values.

version = 1

[models.architect]
provider = "openai-compatible"
model = "replace-with-your-remote-architect-model"
baseUrl = "https://api.openai.com/v1"
apiKey = "${OPENAI_API_KEY}"

[models.engineer]
provider = "llama.cpp"
model = "replace-with-your-local-engineer-model"
baseUrl = "http://127.0.0.1:8080/v1"

[project]
executionTarget = "docker"
containerName = "app"

[commands]
install = "composer install && npm install"
lint = "./vendor/bin/pint --test"
test = "php artisan test"
typecheck = "npm run typecheck"

[mcp]
allowlist = ["laravel-boost"]

[mcp.servers.laravel-boost]
transport = "stdio"
preset = "laravel-boost"

[network]
mode = "inherit"

[sandbox]
mode = "container"

[artifacts]
rootDir = ".agent-harness"
runsDir = ".agent-harness/runs"

[stopConditions]
maxIterations = 12
maxEngineerAttempts = 5
requirePassingChecks = true
